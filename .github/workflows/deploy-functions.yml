name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - ".github/workflows/deploy-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Připnutá verze místo "latest" — latest si tahá přes GitHub API,
          # které dostávalo rate limit ("Failed to resolve latest Supabase
          # CLI release: rate limit exceeded") a shazovalo celý deploy.
          version: 2.109.0

      - name: Link project
        run: supabase link --project-ref pxhpmgzeduqazgfzllyo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          for fn in start-lm-analysis poll-lm-pipeline analyze-lm-session \
                    verify-lm-token send-verification-email get-lm-results \
                    send-lm-report lm-pipeline-watchdog discover-meta-url; do
            supabase functions deploy $fn --no-verify-jwt
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
